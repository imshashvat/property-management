<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMS - Admin Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-icon">🏢</div>
        <div class="brand-text">
          <h2>PMS</h2>
          <span>Admin Panel</span>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Main</div>
      <button class="nav-item active" onclick="navigate('dashboard')"><span class="nav-icon">📊</span> Dashboard</button>
      <button class="nav-item" onclick="navigate('properties')"><span class="nav-icon">🏘️</span> Properties</button>
      <button class="nav-item" onclick="navigate('flats')"><span class="nav-icon">🏠</span> Flats</button>
      <div class="nav-section-title">People</div>
      <button class="nav-item" onclick="navigate('tenants')"><span class="nav-icon">👥</span> Tenants</button>
      <button class="nav-item" onclick="navigate('assignments')"><span class="nav-icon">📋</span> Assignments</button>
      <div class="nav-section-title">Finance</div>
      <button class="nav-item" onclick="navigate('rent')"><span class="nav-icon">💰</span> Rent & Payments</button>
      <div class="nav-section-title">Operations</div>
      <button class="nav-item" onclick="navigate('maintenance')"><span class="nav-icon">🔧</span> Maintenance</button>
      <button class="nav-item" onclick="navigate('announcements')"><span class="nav-icon">📢</span> Announcements</button>
      <button class="nav-item" onclick="navigate('audit')"><span class="nav-icon">📜</span> Audit Logs</button>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <h4 id="sidebarUserName">Admin</h4>
          <span>Property Manager</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <div class="breadcrumb" id="breadcrumb">Home / Dashboard</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-search">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Search..." id="globalSearch">
        </div>
        <button class="icon-btn" onclick="toggleNotifications()" id="notifBtn">
          🔔<span class="notif-dot hidden" id="notifDot"></span>
        </button>
        <button class="icon-btn theme-toggle" onclick="toggleDarkMode()">🌙</button>
        <button class="btn btn-sm btn-outline" onclick="logout()">Logout</button>
      </div>
    </header>

    <div class="page-content" id="pageContent">
      <div class="spinner"></div>
    </div>
  </main>
</div>

<!-- Notification Panel -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-header">
    <h3>Notifications</h3>
    <button class="btn btn-sm btn-secondary" onclick="markAllRead()">Mark all read</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>

<!-- Generic Modal -->
<div class="modal-overlay" id="formModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Form</h2>
      <button class="modal-close" onclick="closeModal('formModal')">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- Credentials Modal -->
<div class="modal-overlay" id="credentialsModal">
  <div class="modal">
    <div class="modal-header">
      <h2>🔑 Tenant Credentials</h2>
      <button class="modal-close" onclick="closeModal('credentialsModal')">✕</button>
    </div>
    <div class="modal-body" id="credentialsBody"></div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="closeModal('credentialsModal')">Done</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
